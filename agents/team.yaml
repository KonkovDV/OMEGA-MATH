name: omega-core-team
version: 0.1.0
status: active

orchestration:
  default_controller: planner
  execution_order:
    - librarian
    - analyst
    - experimentalist_or_prover
    - writer
    - reviewer
  pipeline_stages:
    brief: planner
    novelty: librarian
    triage: planner
    plan: planner
    experiment: experimentalist
    prove: prover
    survey: analyst
    results: analyst
    paper: writer
    referee: reviewer
  routing_rules:
    T1-computational: experimentalist
    T2-experimental: experimentalist
    T3-pattern: analyst
    T4-structural: prover
    T5-foundational: librarian

artifacts:
  required:
    - data-description
    - literature-memo
    - idea-note
    - method-plan
    - result-summary
    - draft
    - referee-report

quality_gates:
  - explicit_evidence_class
  - reproducibility_record
  - literature_collision_check
  - reviewer_signoff
