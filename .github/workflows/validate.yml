name: Validate OMEGA Registry

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python -m pip install build pytest
        # Install optional adapter dependencies for full test coverage
        python -m pip install ".[all]" || true

    - name: Regenerate registry index
      run: |
        python scripts/generate-index.py

    - name: Ensure generated files are committed
      run: |
        if ! git diff --quiet; then
          echo "Generated registry artifacts are out of date."
          echo "Run: python scripts/generate-index.py"
          git --no-pager diff -- registry/index.yaml
          exit 1
        fi
        
    - name: Run registry validator
      run: |
        python scripts/validate-registry.py

    - name: Run unit tests (core + adapters)
      run: |
        python -m pytest tests/ -v --tb=short

    - name: Build Python package
      run: |
        python -m build --wheel
