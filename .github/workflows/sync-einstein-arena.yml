name: Sync Einstein Arena Benchmarks

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 04:00 UTC
    - cron: "0 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-einstein-arena:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install build pytest

      - name: Fetch EinsteinArena README snapshot
        run: |
          mkdir -p .benchmarks
          curl -fsSL "https://raw.githubusercontent.com/togethercomputer/EinsteinArena-new-SOTA/main/README.md" \
            -o .benchmarks/einstein-arena-readme.md

      - name: Import EinsteinArena collection
        run: |
          python scripts/import_einstein_arena.py --readme-file .benchmarks/einstein-arena-readme.md

      - name: Regenerate index and validate registry
        run: |
          python scripts/generate_index.py
          python scripts/validate_registry.py

      - name: Run importer tests
        run: |
          python -m pytest tests/test_import_einstein_arena.py tests/test_registry_pipeline.py --tb=short

      - name: Create pull request if drift found
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bot/sync-einstein-arena
          delete-branch: true
          commit-message: "chore: sync Einstein Arena benchmark snapshot"
          title: "chore: sync Einstein Arena benchmark snapshot"
          body: |
            Automated EinsteinArena synchronization.

            Updated surfaces:
            - registry/collections/einstein-arena-benchmarks.yaml
            - registry/index.yaml

            Source:
            - togethercomputer/EinsteinArena-new-SOTA README table
          labels: |
            automation
            benchmarks
            omega
