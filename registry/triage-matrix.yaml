# OMEGA Triage Matrix — AI Amenability Assessment
# Problems sorted by amenability score (highest first) across all domains.
# This is the prioritized work queue for OMEGA agent teams.

# ═══════════════════════════════════════════════════════════
# TIER 1 — COMPUTATIONAL (amenability 7–10)
# Direct computation, exhaustive search, SAT/SMT solving
# START HERE for quick wins and publishable results.
# ═══════════════════════════════════════════════════════════

tier_1_computational:

  - id: erdos-straus
    name: Erdős–Straus conjecture (4/n = 1/x + 1/y + 1/z)
    score: 8
    domain: number-theory
    approach: parametric-search + covering-congruences
    compute: moderate
    rationale: >
      Verified for n ≤ 10^14 by parametric families. Remaining gaps amenable to
      systematic search. Covering congruence method can potentially give complete proof.
      Five-axis score: searchability 2, signal 2, formalizability 1, speed 2, yield 1.

  - id: selfridge-sierpinski
    name: Is 78557 the smallest Sierpiński number?
    score: 8
    domain: number-theory
    approach: distributed-primality-testing
    compute: massive
    rationale: >
      PrimeGrid already running distributed search. Only a few candidates remain.
      Finding a prime for each remaining candidate confirms the conjecture.

  - id: wall-sun-sun-primes
    name: Existence of Wall–Sun–Sun primes
    score: 8
    domain: number-theory
    approach: brute-force-search
    compute: heavy
    rationale: Pure search problem. If they exist, a search could find one.

  - id: thomson-problem
    name: Thomson problem (charges on sphere)
    score: 8
    domain: geometry
    approach: optimization + monte-carlo + RL
    compute: moderate
    rationale: >
      Direct optimization problem. New configurations for specific n values
      publishable. AI optimization methods directly applicable.

  - id: kobon-triangles
    name: Kobon triangles (max non-overlapping triangles from n lines)
    score: 8
    domain: geometry
    approach: search + SAT
    compute: moderate
    rationale: Small combinatorial search space. Known values for small n, gaps exist.

  - id: hadamard-matrix
    name: Hadamard matrix conjecture (order 668)
    score: 7
    domain: combinatorics
    approach: search + construction
    compute: heavy
    rationale: Many construction methods known. First open case (668) is specific target.

  - id: hadwiger-nelson
    name: Chromatic number of the plane
    score: 7
    domain: graph-theory
    approach: SAT + graph-search
    compute: heavy
    rationale: de Grey (2018) found 5-chromatic graph. Pushing to 6 or ruling it out.

  - id: barnette-conjecture
    name: Barnette's conjecture (bipartite cubic planar Hamiltonian)
    score: 7
    domain: graph-theory
    approach: search + SAT + counterexample
    compute: moderate
    rationale: Counterexample search or exhaustive verification for small cases.

  - id: graceful-tree
    name: Graceful tree conjecture
    score: 7
    domain: graph-theory
    approach: search + SAT
    compute: moderate
    rationale: Verified for many classes. Remaining classes amenable to search.

  - id: magic-square-of-squares
    name: 3×3 magic square of distinct perfect squares
    score: 7
    domain: number-theory
    approach: parametric-search + SAT
    compute: heavy
    rationale: Bounded search problem with known algebraic constraints.

  - id: lychrel-numbers
    name: Lychrel numbers in base 10 (196 problem)
    score: 7
    domain: number-theory
    approach: brute-force-iteration
    compute: heavy
    rationale: Pure iteration. Extending current record (billions) is publishable.

  - id: odd-weird-numbers
    name: Existence of odd weird numbers
    score: 7
    domain: number-theory
    approach: search
    compute: heavy
    rationale: Structural constraints narrow the search space.

  - id: gaussian-moat
    name: Gaussian moat problem
    score: 7
    domain: number-theory
    approach: search + graph-algorithms
    compute: moderate
    rationale: Direct finite computation in Gaussian integers.

  - id: smallest-skewes-number
    name: Smallest Skewes's number
    score: 7
    domain: number-theory
    approach: numerical-search
    compute: massive
    rationale: Direct computation with high-performance arithmetic.

  - id: recaman-sequence
    name: Recamán's sequence completeness
    score: 7
    domain: number-theory
    approach: numerical-search
    compute: moderate
    rationale: Iterate sequence, check missing values. Extending known range.

  - id: brocard-problem
    name: Brocard's problem (n! + 1 = m²)
    score: 7
    domain: number-theory
    approach: search
    compute: moderate
    rationale: Finite search per n. Currently verified to large bounds.

  - id: cerny-conjecture
    name: Černý conjecture (synchronizing words)
    score: 7
    domain: computer-science
    approach: search + SAT
    compute: moderate
    rationale: Verified for small n. SAT-based approaches effective.

  - id: hermite-constants-higher
    name: Hermite constants for higher dimensions
    score: 6
    domain: geometry
    approach: search + optimization
    compute: heavy

  - id: andrews-curtis
    name: Andrews–Curtis conjecture
    score: 6
    domain: algebra
    approach: search + genetic-programming
    compute: moderate
    rationale: Potential counterexample search via transformation sequences.

  - id: scholz-conjecture
    name: Scholz conjecture (addition chains)
    score: 6
    domain: number-theory
    approach: search
    compute: moderate

# ═══════════════════════════════════════════════════════════
# TIER 2 — EXPERIMENTAL (amenability 4–6)
