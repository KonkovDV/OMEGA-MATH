# Results = extended bounds, refined conjectures, pattern discoveries.
# ═══════════════════════════════════════════════════════════

tier_2_experimental:

  - id: ulam-numbers-density
    name: Density of Ulam numbers
    score: 6
    approach: numerical-computation
    rationale: Compute Ulam sequence to large bounds, analyze density empirically.

  - id: singmaster-conjecture
    name: Singmaster's conjecture (Pascal triangle)
    score: 6
    approach: numerical-verification
    rationale: Search for high-multiplicity entries in Pascal's triangle.

  - id: gilbreath-conjecture
    name: Gilbreath's conjecture
    score: 6
    approach: numerical-verification
    rationale: Extend computational verification range.

  - id: self-avoiding-walk-connective
    name: Connective constant for square lattice
    score: 6
    approach: monte-carlo + numerical
    rationale: High-precision numerical estimates. Exact value unknown for square.

  - id: moving-sofa
    name: Moving sofa problem
    score: 6
    approach: optimization + genetic-programming
    rationale: >
      Optimization problem with known near-optimal solution (Gerver).
      AI could discover improved shapes or prove optimality numerically.

  - id: lebesgue-universal
    name: Lebesgue's universal covering problem
    score: 6
    approach: optimization + numerical
    rationale: Improved upper bounds via optimization publishable.

  - id: lyapunov-exponents-standard-map
    name: Positive Lyapunov exponent for standard map
    score: 6
    approach: numerical-simulation
    rationale: Large-scale simulation providing evidence.

  - id: lonely-runner
    name: Lonely runner conjecture
    score: 5
    approach: numerical-verification + search
    rationale: Proven for k ≤ 6. Proving k=7 computationally possible.

  - id: collatz-conjecture
    name: Collatz conjecture
    score: 5
    approach: numerical-verification + pattern-recognition
    rationale: >
      Extending verification range, statistical analysis of stopping times,
      structure of counter-examples if any exist.

  - id: gauss-circle-problem
    name: Gauss circle problem
    score: 5
    approach: numerical-verification + pattern-recognition

  - id: meyniel-conjecture
    name: Meyniel's conjecture (cop number √n)
    score: 5
    approach: counterexample-search + construction

  - id: three-body-problem-general
    name: Three-body periodic solutions
    score: 5
    approach: numerical-search + RL
    rationale: Discovering new periodic three-body solutions amenable to AI.

  - id: bellman-forest
    name: Bellman's lost-in-a-forest problem
    score: 5
    approach: optimization + numerical

  - id: moser-worm
    name: Moser's worm problem
    score: 5
    approach: optimization + numerical

  - id: kummer-vandiver
    name: Kummer–Vandiver conjecture
    score: 5
    approach: numerical-verification + symbolic-computation

  - id: beal-conjecture
    name: Beal's conjecture ($1M prize)
    score: 4
    approach: counterexample-search
    compute: heavy
    rationale: >
      $1M prize. Systematic search for counterexamples.
      Proof likely requires deep algebra.

  - id: goldbach-conjecture
    name: Goldbach's conjecture
    score: 4
    approach: numerical-verification + statistics
    rationale: Extending verification bound and analyzing representation counts.

  - id: odd-perfect-numbers
    name: Odd perfect numbers
    score: 4
    approach: numerical-constraint-search
    rationale: Improving lower bounds on hypothetical odd perfect numbers.

